{% extends 'base.html' %}

{% block title %}Editar Apontamento{% endblock %}

{% block content %}
<style>
  .edit-container {
    max-width: 600px;
    margin: 0 auto;
  }
  .back-link {
    display: inline-block;
    margin-bottom: 16px;
    color: #2563eb;
    text-decoration: none;
    font-weight: 600;
  }
  .edit-form {
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 24px;
  }
  .edit-form h2 {
    margin: 0 0 6px 0;
  }
  .edit-form p {
    margin: 0 0 20px 0;
    color: #64748b;
    font-size: 14px;
  }
  .edit-form form {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .form-label {
    display: flex;
    flex-direction: column;
  }
  .form-label span {
    font-weight: 600;
    margin-bottom: 6px;
    color: #0f172a;
  }
  .form-label select,
  .form-label input,
  .form-label textarea {
    padding: 10px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
    font-size: 14px;
  }
  .form-label textarea {
    resize: vertical;
    min-height: 100px;
  }
  .form-buttons {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  .form-buttons button,
  .form-buttons a {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-weight: 600;
    text-align: center;
    font-size: 14px;
  }
  .form-buttons button {
    background: #2563eb;
    color: white;
    border: none;
    cursor: pointer;
  }
  .form-buttons a {
    background: #e2e8f0;
    color: #1f2937;
    text-decoration: none;
  }
</style>
<div class="edit-container">
  <a href="/admin/relatorios" class="back-link">← Voltar</a>
  
  <div class="edit-form">
    <h2>EDITAR APONTAMENTO</h2>
    <p>O.S: <strong>{{ os.os }}</strong></p>
    
    <form method="POST">
      
      <label class="form-label">
        <span>Auxiliar</span>
        <select name="auxiliar" required>
          <option value="">Selecione um auxiliar</option>
          {% for auxiliar in auxiliares %}
          <option value="{{ auxiliar.nome }}" {% if auxiliar.nome == apontamento.auxiliar %}selected{% endif %}>
            {{ auxiliar.nome }}
          </option>
          {% endfor %}
        </select>
      </label>

      <label class="form-label">
        <span>Área (hectares)</span>
        <input 
          type="number" 
          name="area" 
          step="0.01" 
          value="{{ apontamento.area }}" 
          required
        />
      </label>

      <label class="form-label">
        <span>Data e hora do apontamento</span>
        <input 
          type="datetime-local" 
          name="data_hora" 
          value="{{ data_hora_input }}" 
          required
        />
      </label>

      <label class="form-label">
        <span>Observação</span>
        <textarea name="observacao">{{ apontamento.observacao or '' }}</textarea>
      </label>

      <div class="form-buttons">
        <button type="submit">Salvar Alterações</button>
        <a href="/admin/relatorios">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}

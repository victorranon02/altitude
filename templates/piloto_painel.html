```html
{% extends 'base.html' %}

{% block title %}Painel do Piloto{% endblock %}

{% block content %}

<style>
  .painel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    gap: 12px;
    flex-wrap: wrap;
  }

  .painel-header h2 {
    margin: 0;
  }

  .painel-header p {
    margin: 0;
    color: #4b5563;
  }

  .back-btn {
    padding: 8px 12px;
    background: #e5e7eb;
    color: #111827;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
  }

  .filter-controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .filter-controls label {
    display: flex;
    flex-direction: column;
    font-size: 13px;
    color: #334155;
  }

  .filter-controls input {
    margin-top: 6px;
    padding: 8px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
  }

  .filter-buttons {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  .filter-buttons button {
    padding: 8px 12px;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
  }

  .btn-apply {
    background: #2563eb;
    color: white;
  }

  .btn-clear {
    background: #e2e8f0;
    color: #111827;
  }

  .chart-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 16px;
    align-items: start;
    margin-bottom: 18px;
  }

  .chart-box,
  .summary-box {
    background: white;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
  }

  .chart-box h4,
  .summary-box h3 {
    margin-top: 0;
  }

  .records-box {
    background: white;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #e5e7eb;
  }

  .record-item {
    border-top: 1px solid #eef2ff;
    padding: 10px 0;
  }

  .record-item:first-child {
    border-top: none;
  }

  .record-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .record-detail {
    font-size: 13px;
    color: #374151;
    margin-top: 6px;
  }

  .record-date {
    font-size: 12px;
    color: #6b7280;
  }

  .list-box ul {
    padding-left: 16px;
    margin: 0;
  }

  .list-box li {
    margin-bottom: 4px;
  }

  .open-os-btn {
    display: inline-block;
    margin-top: 8px;
    padding: 6px 10px;
    background: #1d4ed8;
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-size: 13px;
  }

  @media (max-width: 900px) {
    .chart-grid {
      grid-template-columns: 1fr;
    }
  }
</style>

<div class="painel-header">
  <div>
    <h2>Painel - {{ piloto.nome }}</h2>
    <p>Resumo dinâmico das áreas relatadas</p>
  </div>

  <a href="/piloto" class="back-btn">
    Voltar
  </a>
</div>

<div class="filter-controls">
  <label>
    Data início
    <input id="startDate" type="date" />
  </label>

  <label>
    Data fim
    <input id="endDate" type="date" />
  </label>

  <div class="filter-buttons">
    <button id="applyFilter" class="btn-apply">
      Aplicar
    </button>

    <button id="clearFilter" class="btn-clear">
      Limpar
    </button>
  </div>
</div>

<div class="chart-grid">
  <div class="chart-box">
    <h4>Área por O.S</h4>
    <canvas id="areaChart" height="220"></canvas>
  </div>

  <div class="chart-box list-box">
    <h4>Top Auxiliares</h4>
    <ul id="topAuxiliares"></ul>

    <h4 style="margin-top:12px;">
      Top O.S
    </h4>

    <ul id="topOs"></ul>
  </div>
</div>

<div class="summary-box">
  <h3>Seus relatos</h3>
  <div id="registrosList"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
async function fetchData() {
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;

  const params = new URLSearchParams();

  if (start) {
    params.append('start_date', start);
  }

  if (end) {
    params.append('end_date', end);
  }

  const res = await fetch('/piloto/api/relatorios?' + params.toString());

  if (!res.ok) {
    alert('Erro ao carregar dados');
    return null;
  }

  return await res.json();
}

let chart = null;

function renderChart(summary_os) {
  const labels = summary_os.map(item => item[0]);
  const data = summary_os.map(item => item[1]);

  const ctx = document.getElementById('areaChart').getContext('2d');

  if (chart) {
    chart.destroy();
  }

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: 'Área por O.S (ha)',
        data: data,
        backgroundColor: 'rgba(37,99,235,0.7)'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: false
        }
      }
    }
  });
}

function renderLists(summary_aux, summary_os, registros) {
  const topAux = document.getElementById('topAuxiliares');
  const topOs = document.getElementById('topOs');
  const registrosList = document.getElementById('registrosList');

  topAux.innerHTML = '';
  topOs.innerHTML = '';
  registrosList.innerHTML = '';

  summary_aux.forEach(a => {
    const li = document.createElement('li');
    li.textContent = `${a[0]} — ${a[1].toFixed(2)} ha`;
    topAux.appendChild(li);
  });

  summary_os.forEach(o => {
    const li = document.createElement('li');
    li.textContent = `${o[0]} — ${o[1].toFixed(2)} ha`;
    topOs.appendChild(li);
  });

  if (registros.length === 0) {
    registrosList.innerHTML =
      '<div style="color:#6b7280;">Nenhum relato encontrado para o período selecionado.</div>';
    return;
  }

  registros.forEach(r => {
    const div = document.createElement('div');
    div.className = 'record-item';

    div.innerHTML = `
      <div class="record-header">
        <div>
          <strong>${r.os || 'N/A'}</strong>
          — ${r.auxiliar || 'Sem auxiliar'}
        </div>

        <div class="record-date">
          ${r.data || ''}
        </div>
      </div>

      <div class="record-detail">
        ${r.area || 0} ha — ${r.observacao || ''}
      </div>
    `;

    if (r.os_id) {
      const link = document.createElement('a');
      link.href = '/os/' + r.os_id;
      link.className = 'open-os-btn';
      link.innerText = 'Abrir O.S';

      div.appendChild(link);
    }

    registrosList.appendChild(div);
  });
}

async function loadAndRender() {
  const data = await fetchData();

  if (!data) {
    return;
  }

  renderChart(data.summary_os.slice(0, 20));

  renderLists(
    data.summary_auxiliares.slice(0, 20),
    data.summary_os.slice(0, 20),
    data.registros
  );
}

document.getElementById('applyFilter')
  .addEventListener('click', loadAndRender);

document.getElementById('clearFilter')
  .addEventListener('click', () => {
    document.getElementById('startDate').value = '';
    document.getElementById('endDate').value = '';
    loadAndRender();
  });

loadAndRender();
</script>

{% endblock %}
```
